name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sempt
          POSTGRES_PASSWORD: sempt
          POSTGRES_DB: sempt
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sempt -d sempt"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://sempt:sempt@localhost:5432/sempt?schema=public
      NEXTAUTH_SECRET: ci-secret
      AUTH_SECRET: ci-secret
      NEXTAUTH_URL: http://localhost:3000
      DISCORD_CLIENT_ID: ci-client-id
      DISCORD_CLIENT_SECRET: ci-client-secret
      AI_PROVIDER: rule-based
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm db:push
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
